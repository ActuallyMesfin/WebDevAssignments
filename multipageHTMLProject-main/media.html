<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Page</title>
</head>
<body>

    <video width="640" height="360" controls>
    
        <source src="SimpleVideo.mp4" type="video/mp4">
    
        <track src="subs_en.vtt" kind="subtitles" srclang="en" label="English" default>
        <track src="subs_es.vtt" kind="subtitles" srclang="es" label="Spanish">
      
    </video>

    <br> <br>

    <audio src="SimpleAudio.mp3" controls loop></audio> 

    <br> <br>

    <figure>
        <img src="SimpleImage.jpg" alt="An Image of the Simien Mountains">
        <figcaption><h1>Caption</h1></figcaption>
    </figure>

</body>
</html>
