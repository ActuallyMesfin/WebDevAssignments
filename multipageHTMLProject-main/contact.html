<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>

    <form action="#">

    Text Input: <input type="text"> <br>
    Email Input: <input type="email"> <br>
    Date Input: <input type="date"> <br>

    Choose a car : <select name="selections"> 
        <option value="choiceOne">choiceOne</option>
        <option value="choiceTwo">choiceTwo</option>
        <option value="choiceThree">choiceThree</option>
    </select>

    <br>

    Text Area : <textarea name="textArea" id="textArea"></textarea>

    <br>
    <br>

    Choice One : <input type="radio" name="radioChoices" id="radioOne"> <br>
    Choice Two : <input type="radio" name="radioChoices" id="radioTwo"> <br>
    Choice Three : <input type="radio" name="radioChoices" id="radioThree">


    <br> <br>


    Checkbox One : <input type="checkbox" name="checkBoxOne" id="checkBoxOne"> <br>
    Checkbox Two : <input type="checkbox" name="checkBoxTwo" id="checkBoxOne"> <br>
    Checkbox Three : <input type="checkbox" name="checkBoxThree" id="checkBoxOne"> <br>

    <input type="submit" value="Submit">

</form>
</body>
</html>

<!--

A text input ( <input type="text"> ).
• An email input ( <input type="email"> ).
• A date input ( <input type="date"> ).
• A dropdown select box ( <select> with <option> elements).
• A multi-line text area ( <textarea> ).
• Radio buttons ( <input type="radio"> ) for mutually exclusive choices.
• Checkboxes ( <input type="checkbox"> ) for multiple selections.

-->
